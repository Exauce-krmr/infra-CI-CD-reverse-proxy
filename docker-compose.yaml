services:
  nginx:
    container_name: nginx-ct
    image: nginx:stable-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
    - "8000:8000"
    command: [nginx-debug, '-g', 'daemon off;']
    environment:
    - NGINX_PORT=8000
    depends_on:
      - pokemon-trader
      - rust-app

  pokemon-trader:
    container_name: pokemon-trader-ct
    build: pokemon-trader

  rust-app:
    container_name: rust-app-ct
    build: rust_app
